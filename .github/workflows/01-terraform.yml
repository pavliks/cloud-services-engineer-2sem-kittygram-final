name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Select the Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    env:
      TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_zone: ${{ vars.YC_ZONE }}
      TF_VAR_ssh_user: ${{ vars.VM_SSH_USER }}
      TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
      TF_VAR_app_bucket_name: ${{ secrets.YC_APP_BUCKET }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Check required variables
        run: |
          required_vars=(
            TERRAFORM_VERSION
            YC_TOKEN
            TF_VAR_cloud_id
            TF_VAR_folder_id
            TF_VAR_zone
            TF_VAR_ssh_user
            TF_VAR_ssh_public_key
            TF_VAR_app_bucket_name
            TF_STATE_BUCKET
            TF_STATE_KEY
            TF_STATE_REGION
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
          )
          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "$name is required"
              exit 1
            fi
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$TF_STATE_REGION"

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
